name: test

# Lancia i test a ogni push e su ogni pull request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # niente npm install: il motore e i test sono zero-dipendenze
      # (playwright/axe sono opzionali e caricati a runtime con fallback graceful)
      - run: node test.js
