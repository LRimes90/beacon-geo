<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Beacon">
  <defs>
    <radialGradient id="beam" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#E8B15A" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#E8B15A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#E8B15A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- sfondo teal scuro coerente col tema (--bg) -->
  <rect width="32" height="32" rx="7" fill="#0A1512"/>
  <!-- alone luminoso ambra (faro/beacon) -->
  <circle cx="16" cy="15" r="13" fill="url(#beam)"/>
  <!-- punto luminoso ambra (richiama il .dot del brand) -->
  <circle cx="16" cy="15" r="4.4" fill="#E8B15A"/>
  <!-- anello teal accento -->
  <circle cx="16" cy="15" r="4.4" fill="none" stroke="#42D1C8" stroke-opacity="0.55" stroke-width="1.1"/>
</svg>
